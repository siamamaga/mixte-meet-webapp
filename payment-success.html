<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paiement - Mixte-Meet</title>
<style>
body{margin:0;background:#0D0A14;color:white;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px;}
.box{max-width:400px;}
.icon{font-size:80px;margin-bottom:20px;}
h1{font-family:Georgia,serif;font-size:28px;margin-bottom:12px;}
p{color:rgba(255,255,255,0.7);margin-bottom:24px;line-height:1.6;}
a{display:inline-block;background:linear-gradient(135deg,#E8317A,#C41F65);color:white;padding:14px 32px;border-radius:50px;text-decoration:none;font-weight:700;font-size:16px;}
</style>
</head>
<body>
<div class="box" id="content"></div>
<script>
const params = new URLSearchParams(window.location.search);
const status = params.get('status') || '';
const closed = params.get('close') === 'true';
const el = document.getElementById('content');
if (closed || status === 'cancelled' || status === 'canceled') {
  el.innerHTML = '<div class="icon">❌</div><h1 style="color:#EF4444;">Paiement annulé</h1><p>Vous avez annulé le paiement.<br>Aucun montant n\'a été débité.</p><a href="https://mixte-meet.fr">Retour à l\'application</a>';
} else if (status === 'approved' || status === 'success') {
  el.innerHTML = '<div class="icon">🎉</div><h1 style="color:#E8317A;">Paiement réussi !</h1><p>Votre abonnement Premium est maintenant actif.<br>Profitez de toutes les fonctionnalités Mixte-Meet !</p><a href="https://mixte-meet.fr">Retour à l\'application</a>';
} else if (status === 'pending') {
  el.innerHTML = '<div class="icon">⏳</div><h1 style="color:#F59E0B;">En attente de confirmation</h1><p>Votre paiement est en cours de traitement.<br>Validez sur votre téléphone MTN avec <strong>*880#</strong> → 8<br>Votre Premium sera activé automatiquement.</p><a href="https://mixte-meet.fr">Retour à l\'application</a>';
} else {
  el.innerHTML = '<div class="icon">🔄</div><h1 style="color:#E8317A;">Retour en cours...</h1><p>Redirection vers l\'application.</p><a href="https://mixte-meet.fr">Retour à l\'application</a>';
}
</script>
</body>
</html>
