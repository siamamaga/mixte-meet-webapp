<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixte-Meet — Réinitialisation mot de passe</title>
<meta name="theme-color" content="#E8317A">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --pink: #E8317A; --dark: #0D0810; --surface: #1A1020;
    --card: #1F1428; --border: rgba(255,255,255,0.08);
    --muted: rgba(255,255,255,0.45); --white: #FFFFFF;
  }
  body { background:var(--dark); color:var(--white); font-family:'Outfit',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .container { width:100%; max-width:420px; }
  .logo { text-align:center; margin-bottom:40px; }
  .logo-icon { width:64px; height:64px; background:linear-gradient(135deg,var(--pink),#C41F65); border-radius:18px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; box-shadow:0 8px 28px rgba(232,49,122,0.4); }
  .logo h1 { font-family:'Playfair Display',serif; font-size:28px; font-weight:900; }
  .logo p { font-size:14px; color:var(--muted); margin-top:6px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:24px; padding:32px; }
  .card h2 { font-family:'Playfair Display',serif; font-size:22px; margin-bottom:8px; }
  .card p { font-size:14px; color:var(--muted); margin-bottom:24px; }
  .input-group { margin-bottom:16px; }
  .input-label { display:block; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
  .input-field { width:100%; padding:14px 16px; background:rgba(255,255,255,0.06); border:1px solid var(--border); border-radius:12px; color:var(--white); font-family:'Outfit',sans-serif; font-size:15px; outline:none; transition:border-color 0.2s; }
  .input-field:focus { border-color:var(--pink); }
  .btn { width:100%; padding:16px; background:linear-gradient(135deg,var(--pink),#C41F65); border:none; border-radius:50px; color:white; font-family:'Outfit',sans-serif; font-size:16px; font-weight:700; cursor:pointer; margin-top:8px; transition:opacity 0.2s; }
  .btn:hover { opacity:0.9; }
  .btn:disabled { opacity:0.5; cursor:not-allowed; }
  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:12px 24px; border-radius:50px; font-size:14px; font-weight:600; z-index:9999; display:none; }
  .toast.success { background:rgba(34,197,94,0.9); color:white; }
  .toast.error { background:rgba(239,68,68,0.9); color:white; }
  .back-link { text-align:center; margin-top:20px; }
  .back-link a { color:var(--muted); font-size:14px; text-decoration:none; }
  .back-link a:hover { color:var(--white); }
  #success-view { display:none; text-align:center; }
  #success-view .icon { font-size:64px; margin-bottom:16px; }
  #success-view h2 { font-family:'Playfair Display',serif; font-size:24px; margin-bottom:8px; }
  #success-view p { color:var(--muted); font-size:14px; margin-bottom:24px; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-icon">
      <svg width="40" height="40" viewBox="0 0 56 56" fill="none">
        <path d="M28 36 C22 28, 8 26, 5 31 C2 36, 11 44, 23 39 C25.5 38, 27 37, 28 36Z" fill="white" opacity="0.9"/>
        <path d="M28 36 C34 28, 48 26, 51 31 C54 36, 45 44, 33 39 C30.5 38, 29 37, 28 36Z" fill="black" opacity="0.85"/>
      </svg>
    </div>
    <h1>Mixte-Meet</h1>
    <p>L'amour n'a pas de frontières 🌍</p>
  </div>

  <div class="card">
    <div id="form-view">
      <h2>🔐 Nouveau mot de passe</h2>
      <p>Choisissez un nouveau mot de passe sécurisé pour votre compte.</p>
      <div class="input-group">
        <label class="input-label">Nouveau mot de passe</label>
        <input id="new-password" type="password" class="input-field" placeholder="Minimum 8 caractères">
      </div>
      <div class="input-group">
        <label class="input-label">Confirmer le mot de passe</label>
        <input id="confirm-password" type="password" class="input-field" placeholder="Répétez le mot de passe">
      </div>
      <button class="btn" id="submit-btn" onclick="resetPassword()">Réinitialiser le mot de passe</button>
    </div>

    <div id="success-view">
      <div class="icon">✅</div>
      <h2>Mot de passe mis à jour !</h2>
      <p>Votre mot de passe a été modifié avec succès. Vous pouvez maintenant vous connecter.</p>
      <a href="/" style="display:block;padding:16px;background:linear-gradient(135deg,#E8317A,#C41F65);border-radius:50px;color:white;font-weight:700;text-decoration:none;font-family:Outfit,sans-serif;">
        Se connecter 🦋
      </a>
    </div>
  </div>

  <div class="back-link">
    <a href="/">← Retour à l'application</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3500);
  }

  function getToken() {
    const params = new URLSearchParams(window.location.search);
    return params.get('token');
  }

  async function resetPassword() {
    const token = getToken();
    if (!token) { showToast('Lien invalide ou expiré', 'error'); return; }
    const password = document.getElementById('new-password').value;
    const confirm  = document.getElementById('confirm-password').value;
    if (!password || password.length < 8) { showToast('Le mot de passe doit contenir au moins 8 caractères', 'error'); return; }
    if (password !== confirm) { showToast('Les mots de passe ne correspondent pas', 'error'); return; }
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Réinitialisation...';
    try {
      const res = await fetch('https://api.mixte-meet.fr/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('success-view').style.display = 'block';
      } else {
        showToast(data.message || 'Erreur — lien expiré ?', 'error');
        btn.disabled = false;
        btn.textContent = 'Réinitialiser le mot de passe';
      }
    } catch(e) {
      showToast('Erreur de connexion', 'error');
      btn.disabled = false;
      btn.textContent = 'Réinitialiser le mot de passe';
    }
  }

  // Vérifier que le token est présent
  window.onload = function() {
    if (!getToken()) {
      document.getElementById('form-view').innerHTML = '<div style="text-align:center;padding:20px;"><div style="font-size:48px;margin-bottom:16px;">⚠️</div><p style="color:var(--muted);">Lien invalide ou expiré. Demandez un nouveau lien de réinitialisation.</p><br><a href="/" style="color:#E8317A;">Retour à l\'application</a></div>';
    }
  };
</script>
</body>
</html>
